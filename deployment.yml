apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderbook
  namespace: qa
  labels:
    app: orderbook
    build: "BUILD_PLACEHOLDER"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orderbook
  template:
    metadata:
      labels:
        app: orderbook
        build: "BUILD_PLACEHOLDER"
    spec:
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: tomcat
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8085
          env:
            - name: BUILD_NUMBER
              value: "BUILD_PLACEHOLDER"
          resources:
            requests:
              memory: "256Mi"  # Reduced
              cpu: "100m"      # Reduced
            limits:
              memory: "512Mi"  # Reduced
              cpu: "300m"      # Reduced
          readinessProbe:
            httpGet:
              path: /
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10